server:
  port: 8080

spring:
  application:
    name: smart-archive-management-backend
  jackson:
    serialization:
      indent_output: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_archive
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.smartarchive.**
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

archive:
  security:
    watermark-enabled: true
    default-data-scope: ORGANIZATION
  ai:
    ocr-enabled: true
    metadata-extract-enabled: true
    semantic-search-enabled: true
  ocr:
    enabled: true
    tesseract-path: C:/Program Files/Tesseract-OCR/tesseract.exe
    tessdata-dir: D:/AI project/AI-search/ocr/tessdata
    pdf-dpi: 300
    timeout-seconds: 180
